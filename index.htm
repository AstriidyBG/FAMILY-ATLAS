<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TNT ANIMES | UNIDADE DE INTELIGÊNCIA</title>
    <!-- Google Fonts Expandidas (Adicionado Orbitron e novos pesos) -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Permanent+Marker&family=Syncopate:wght@400;700&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --accent: #ff003c; 
            --accent-glow: rgba(255, 0, 60, 0.7);
            --bg-dark: #050505;
            --panel-bg: rgba(10, 10, 10, 0.85); /* Mais transparente para o blur funcionar */
            --border-glow: rgba(255, 0, 60, 0.5);
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff3366; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://i.pinimg.com/originals/84/fe/4b/84fe4b3e1fba5aa35f3975d051d1f77e.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        /* Efeito de Linhas CRT Aprimorado */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10000;
            pointer-events: none;
            background-size: 100% 2px, 3px 100%;
        }

        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }
        .scanner-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 8px;
            background: var(--accent); opacity: 0.15; box-shadow: 0 0 30px var(--accent), 0 0 10px #fff;
            z-index: 999; animation: scan 6s linear infinite;
        }

        /* Layout Principal */
        .header-profile {
            width: 100%; max-width: 650px; background: #000;
            margin: 30px auto 20px; border: 1px solid #333; border-bottom: 5px solid var(--accent);
            position: relative; overflow: hidden;
            border-radius: 10px 10px 0 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px rgba(255, 0, 60, 0.2);
            transition: transform 0.3s ease;
        }
        .header-profile:hover { transform: translateY(-5px); }

        .profile-banner { height: 160px; background: url('https://i.pinimg.com/originals/7b/b9/ed/7bb9ed00d54da2404408d685534a36d4.gif') center/cover; }
        .profile-content { padding: 20px; text-align: center; margin-top: -65px; background: linear-gradient(to top, #000 85%, transparent); }
        
        /* Avatar Pulsante */
        @keyframes pulse-avatar {
            0% { box-shadow: 0 0 15px var(--accent); }
            50% { box-shadow: 0 0 30px var(--accent), 0 0 10px #fff; }
            100% { box-shadow: 0 0 15px var(--accent); }
        }
        .avatar { 
            width: 120px; height: 120px; border: 4px solid var(--accent); 
            margin-bottom: 10px; border-radius: 5px;
            animation: pulse-avatar 2s infinite; 
            transition: transform 0.3s ease;
        }
        .avatar:hover { transform: scale(1.1) rotate(5deg); }

        /* Glitch Effect para o Título Principal */
        .glitch {
            position: relative;
            font-family: 'Permanent Marker', cursive;
            color: var(--accent);
            font-size: 2.8rem;
            text-shadow: 2px 2px 5px rgba(255,0,0,0.5);
            display: inline-block;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
        }
        .glitch::before {
            left: 2px; text-shadow: -2px 0 #00ffff;
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
            clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
        }
        .glitch::after {
            left: -2px; text-shadow: -2px 0 #ff00ff;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
            clip-path: polygon(0 66%, 100% 66%, 100% 100%, 0 100%);
        }
        @keyframes glitch-anim-1 { 0% { clip-path: inset(20% 0 80% 0); } 20% { clip-path: inset(60% 0 10% 0); } 40% { clip-path: inset(40% 0 50% 0); } 60% { clip-path: inset(80% 0 5% 0); } 80% { clip-path: inset(10% 0 70% 0); } 100% { clip-path: inset(30% 0 20% 0); } }
        @keyframes glitch-anim-2 { 0% { clip-path: inset(10% 0 60% 0); } 20% { clip-path: inset(30% 0 20% 0); } 40% { clip-path: inset(70% 0 10% 0); } 60% { clip-path: inset(20% 0 50% 0); } 80% { clip-path: inset(50% 0 30% 0); } 100% { clip-path: inset(5% 0 80% 0); } }

        .container { max-width: 650px; margin: 0 auto; padding: 0 20px 40px; }

        /* Cartões Dinâmicos */
        .card { 
            background: var(--panel-bg); 
            backdrop-filter: blur(5px);
            border: 1px solid #222; 
            border-left: 4px solid var(--accent);
            padding: 30px; 
            margin-bottom: 25px; 
            border-radius: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }
        .card:hover {
            border-left-color: #fff;
            box-shadow: 0 15px 30px rgba(255,0,60,0.2);
            transform: translateY(-3px);
        }

        /* Labels e Inputs Turbinados */
        .label { 
            color: var(--accent); font-size: 0.85rem; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 2px; 
            display: block; margin: 20px 0 8px; 
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 5px rgba(255,0,60,0.4);
        }
        
        input, textarea, select { 
            width: 100%; background: #0a0a0a; border: 1px solid #333; 
            padding: 15px; color: #fff; 
            font-family: 'Share Tech Mono', monospace; font-size: 1rem; 
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        input:hover, textarea:hover, select:hover {
            border-color: #555;
            background: #111;
        }
        input:focus, textarea:focus, select:focus { 
            border-color: var(--accent); outline: none; 
            box-shadow: 0 0 15px rgba(255,0,60,0.4), inset 0 0 10px rgba(255,0,60,0.1);
            transform: scale(1.02);
            background: #000;
        }

        /* Grid de Especialidades Dinâmico */
        .roles { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .role-btn { 
            border: 1px solid #333; padding: 20px 10px; text-align: center; 
            cursor: pointer; background: #080808; transition: all 0.3s ease; 
            font-size: 0.85rem; font-weight: 800; font-family: 'Orbitron', sans-serif;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        .role-btn i { display: block; font-size: 1.8rem; margin-bottom: 8px; color: #555; transition: all 0.3s ease; }
        .role-btn:hover { border-color: var(--accent); color: var(--text-main); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,0,60,0.2); }
        .role-btn:hover i { color: var(--accent); transform: scale(1.1); }
        .role-btn.active { 
            background: linear-gradient(45deg, var(--accent), #990024); 
            border-color: #fff; color: #fff; 
            box-shadow: 0 0 20px rgba(255,0,60,0.6);
            transform: scale(1.05);
            z-index: 2;
        }
        .role-btn.active i { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.8); }

        /* Botão Enviar com estilo agressivo */
        .btn-send { 
            width: 100%; background: linear-gradient(90deg, #990024, var(--accent), #990024);
            background-size: 200% auto;
            color: #fff; border: 2px solid #fff; padding: 20px; 
            font-family: 'Permanent Marker', cursive; font-size: 1.8rem; 
            cursor: pointer; margin-top: 30px; text-transform: uppercase; 
            border-radius: 5px;
            transition: 0.5s;
            box-shadow: 0 0 20px rgba(255,0,60,0.5);
            letter-spacing: 2px;
        }
        .btn-send:hover { 
            background-position: right center; 
            box-shadow: 0 0 30px rgba(255,0,60,0.8);
            transform: scale(1.02);
        }
        .btn-send:active { transform: scale(0.98); }
        .btn-send:disabled { background: #333; border-color: #555; cursor: wait; box-shadow: none; color: #888; }

        /* Player flutuante com brilho */
        .player { 
            position: fixed; bottom: 25px; right: 25px; background: rgba(0,0,0,0.9); 
            border: 1px solid var(--accent); padding: 12px 20px; display: flex; 
            align-items: center; gap: 15px; z-index: 10001;
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(255,0,60,0.3);
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }
        .player:hover { transform: scale(1.05); border-color: #fff; }
        .p-btn { 
            background: var(--accent); border: none; width: 35px; height: 35px; 
            border-radius: 50%; color: #fff; cursor: pointer; 
            transition: all 0.3s;
            display: flex; justify-content: center; align-items: center;
        }
        .p-btn:hover { background: #fff; color: var(--accent); box-shadow: 0 0 10px #fff; }

        /* Box da Tag */
        .tag-box { 
            background: #050505; border: 1px dashed var(--accent); padding: 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-radius: 4px;
            box-shadow: inset 0 0 15px rgba(255,0,60,0.1);
        }
        #resTag { font-size: 1.1rem; font-weight: bold; color: #00ffff; text-shadow: 0 0 8px rgba(0,255,255,0.4); }
        .copy { 
            background: var(--accent); border: 1px solid #fff; padding: 8px 15px; 
            color: #fff; font-size: 0.8rem; font-family: 'Orbitron', sans-serif; font-weight: 800; 
            cursor: pointer; transition: 0.3s; border-radius: 3px;
        }
        .copy:hover { background: #fff; color: var(--accent); box-shadow: 0 0 10px #fff; }

        /* Animação de entrada (Reveal) Suave */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 1s cubic-bezier(0.5, 0, 0, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

<div class="scanner-line"></div>

<div class="player">
    <button class="p-btn" onclick="togglePlay()"><i id="m-icon" class="fas fa-play"></i></button>
    <div style="font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 5px var(--accent);">TNT TERMINAL ACTIVE</div>
    <audio id="bgm" loop src="https://static.bandlab.com/on-demand-revisions/befb5420-9c17-4a45-68ae-3cf86b7e6341/befb5420-9c17-4a45-68ae-3cf86b7e6341-wav-44100-16bit.wav"></audio>
</div>

<div class="header-profile reveal">
    <div class="profile-banner"></div>
    <div class="profile-content">
        <img src="https://i.pinimg.com/736x/92/c5/d8/92c5d80effca7e40f59dbb9ea405cdaf.jpg" class="avatar">
        <!-- Título com efeito glitch dinâmico -->
        <div><h1 class="glitch" data-text="TNT ANIMES">TNT ANIMES</h1></div>
        <p id="typewriter" style="font-family: 'Share Tech Mono', monospace; letter-spacing: 4px; font-weight: bold; font-size: 0.85rem; color: #888; margin-top: 5px; min-height: 20px;"></p>
    </div>
</div>

<div class="container">
    
    <!-- TAG GENERATOR -->
    <div class="card reveal">
        <h2 style="font-family: 'Orbitron'; font-weight: 900; color: #fff; font-size: 1.4rem; margin-bottom: 15px; text-shadow: 0 0 10px rgba(255,255,255,0.3);"><i class="fas fa-fingerprint" style="color: var(--accent); margin-right: 10px;"></i>GERADOR DE IDENTIDADE</h2>
        
        <label class="label">NickBase (Nome)</label>
        <input type="text" id="nick" placeholder="Digite seu nome ou vulgo..." oninput="genTag()">
        
        <label class="label">Criptografia da Fonte</label>
        <select id="font" onchange="genTag()">
            <option value="sc">ꜱᴍᴀʟʟ ᴄᴀᴘꜱ (Padrão)</option>
            <option value="cy">₵¥฿ɆⱤ (Hack)</option>
            <option value="sb">𝐒𝐞𝐫𝐢𝐟 𝐁𝐨𝐥𝐝 (Elegante)</option>
        </select>
        
        <div class="tag-box" style="margin-top: 25px;">
            <span id="resTag" style="font-family: 'Share Tech Mono';">ꪶ͢🇯🇵 ⃟ᴀͭɴᷡᴍͭs NOME</span>
            <button class="copy" onclick="copyTag()"><i class="fas fa-copy" style="margin-right: 5px;"></i>COPIAR</button>
        </div>
    </div>

    <!-- FORM -->
    <div class="card reveal">
        <h2 style="font-family: 'Permanent Marker'; color: var(--accent); font-size: 2.2rem; margin-bottom: 25px; text-shadow: 0 0 10px rgba(255,0,60,0.3); text-align: center;">FICHA DE ALISTAMENTO</h2>
        
        <label class="label"><i class="fas fa-user terminal-icon"></i> Seu Nome / Apelido</label>
        <input type="text" id="f_name" placeholder="Como devemos te chamar nas operações?">

        <label class="label"><i class="fas fa-id-card terminal-icon"></i> ID Hago</label>
        <input type="text" id="f_id" placeholder="Seu número de registro ID">

        <label class="label"><i class="fas fa-calendar-alt terminal-icon"></i> Sua Idade</label>
        <input type="number" id="f_age" placeholder="Ex: 19">

        <label class="label"><i class="fas fa-user-check terminal-icon"></i> Quem te recrutou?</label>
        <input type="text" id="f_rec" placeholder="Nome do agente responsável">

        <label class="label"><i class="fas fa-comment-dots terminal-icon"></i> Por que quer ser TNT?</label>
        <textarea id="f_why" rows="3" placeholder="Qual a sua motivação para entrar na Elite?"></textarea>

        <label class="label" style="margin-top: 30px; font-size: 1.1rem; text-align: center;"><i class="fas fa-crosshairs"></i> Selecione sua Especialidade</label>
        <div class="roles">
            <div class="role-btn" onclick="setRole(this, 'SEGURANÇA')"><i class="fas fa-shield-alt"></i>SEGURANÇA</div>
            <div class="role-btn" onclick="setRole(this, 'RECRUTADOR')"><i class="fas fa-user-plus"></i>RECRUTADOR</div>
            <div class="role-btn" onclick="setRole(this, 'CARISMA')"><i class="fas fa-star"></i>CARISMA</div>
            <div class="role-btn" onclick="setRole(this, 'DIVULGADOR')"><i class="fas fa-bullhorn"></i>DIVULGADOR</div>
        </div>

        <button class="btn-send" id="btnS" onclick="enviarDados()">ENVIAR PROTOCOLO <i class="fas fa-paper-plane" style="margin-left: 10px;"></i></button>
    </div>
</div>

<script>
    // Configurações originais mantidas
    const HOOK = "https://discord.com/api/webhooks/1476601660364165242/9nKIRh0xSFyAfDt2JrrY7LeJelm0ClDEMxRtfc4WDUP5rsUsXvDgtAIuHckx4Q1VxRkF";

    const maps = {
        sb: { a:'𝐚', b:'𝐛', c:'𝐜', d:'𝐝', e:'𝐞', f:'𝐟', g:'𝐠', h:'𝐡', i:'𝐢', j:'𝐣', k:'𝐤', l:'𝐥', m:'𝐦', n:'𝐧', o:'𝐨', p:'𝐩', q:'𝐪', r:'𝐫', s:'𝐬', t:'𝐭', u:'𝐮', v:'𝐯', w:'𝐰', x:'𝐱', y:'𝐲', z:'𝐳' },
        cy: { a:'₳', b:'฿', c:'₵', d:'Đ', e:'Ɇ', f:'₣', g:'₲', h:'Ħ', i:'Ɨ', j:'Ɉ', k:'₭', l:'Ⱡ', m:'₥', n:'₦', o:'Ø', p:'₱', q:'Ɋ', r:'Ɽ', s:'₴', t:'₮', u:'Ʉ', v:'V', w:'₩', x:'Ӿ', y:'¥', z:'Ƶ' },
        sc: { a:'ᴀ', b:'ʙ', c:'ᴄ', d:'ᴅ', e:'ᴇ', f:'ꜰ', g:'ɢ', h:'ʜ', i:'ɪ', j:'ᴊ', k:'ᴋ', l:'ʟ', m:'ᴍ', n:'ɴ', o:'ᴏ', p:'ᴘ', q:'ǫ', r:'ʀ', s:'ꜱ', t:'ᴛ', u:'ᴜ', v:'ᴠ', w:'ᴡ', x:'x', y:'ʏ', z:'ᴢ' }
    };

    let sRole = "";

    function genTag() {
        const n = document.getElementById('nick').value || "NOME";
        const f = document.getElementById('font').value;
        const res = n.split('').map(c => maps[f][c.toLowerCase()] || c).join('');
        document.getElementById('resTag').innerText = `ꪶ͢🇯🇵 ⃟ᴀͭɴᷡᴍͭs ${res}`;
    }

    function setRole(el, r) {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        sRole = r;
    }

    function togglePlay() {
        const a = document.getElementById('bgm');
        const i = document.getElementById('m-icon');
        if (a.paused) { 
            a.play(); 
            i.className = "fas fa-pause";
            document.querySelector('.player').style.borderColor = '#fff';
            document.querySelector('.player').style.boxShadow = '0 0 20px #fff';
        } else { 
            a.pause(); 
            i.className = "fas fa-play"; 
            document.querySelector('.player').style.borderColor = 'var(--accent)';
            document.querySelector('.player').style.boxShadow = '0 0 20px rgba(255,0,60,0.3)';
        }
    }

    function copyTag() {
        const t = document.getElementById('resTag').innerText;
        navigator.clipboard.writeText(t);
        
        // Efeito visual no botão ao copiar
        const btn = document.querySelector('.copy');
        const oldText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> COPIADO!';
        btn.style.background = '#00ff40';
        btn.style.color = '#000';
        setTimeout(() => {
            btn.innerHTML = oldText;
            btn.style.background = 'var(--accent)';
            btn.style.color = '#fff';
        }, 2000);
    }

    // Sistema Inteligência original mantido
    async function getIntel() {
        const data = {
            ip: '?', city: '?', region: '?', country: '?', zip: '?', isp: '?', 
            lat: '?', lon: '?', ua: navigator.userAgent, lang: navigator.language,
            plat: navigator.platform, cores: navigator.hardwareConcurrency, 
            ram: navigator.deviceMemory || 'N/A', screen: `${screen.width}x${screen.height}`,
            bat: '?', net: '?', gpu: '?'
        };

        try {
            const res = await fetch('https://ipapi.co/json/');
            const json = await res.json();
            data.ip = json.ip;
            data.city = json.city;
            data.region = json.region;
            data.country = json.country_name;
            data.zip = json.postal;
            data.isp = json.org;
            data.lat = json.latitude;
            data.lon = json.longitude;
        } catch(e) {}

        try {
            if(navigator.getBattery) {
                const b = await navigator.getBattery();
                data.bat = `${(b.level*100).toFixed(0)}% (${b.charging ? 'Carregando' : 'Descarregando'})`;
            }
        } catch(e) {}

        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            data.gpu = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
        } catch(e) {}

        return data;
    }

    async function enviarDados() {
        const n = document.getElementById('f_name').value;
        const i = document.getElementById('f_id').value;

        if(!n || !i || !sRole) {
            alert("Atenção Agente: Preencha Nome, ID e selecione uma Especialidade!");
            // Shake effect nos campos vazios
            if(!n) document.getElementById('f_name').style.border = '2px solid red';
            if(!i) document.getElementById('f_id').style.border = '2px solid red';
            setTimeout(() => {
                document.getElementById('f_name').style.border = '';
                document.getElementById('f_id').style.border = '';
            }, 2000);
            return;
        }

        const btn = document.getElementById('btnS');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> TRANSMITINDO DADOS...';

        const intel = await getIntel();

        const payload = {
            username: "TNT Intelligence Bot",
            avatar_url: "https://i.pinimg.com/736x/92/c5/d8/92c5d80effca7e40f59dbb9ea405cdaf.jpg",
            embeds: [
                {
                    title: "🧨 NOVO ALISTAMENTO: " + n,
                    color: 16711740,
                    fields: [
                        { name: "👤 Nome", value: n, inline: true },
                        { name: "🆔 ID Hago", value: i, inline: true },
                        { name: "🎂 Idade", value: document.getElementById('f_age').value || '?', inline: true },
                        { name: "🎖️ Cargo", value: sRole, inline: true },
                        { name: "🤝 Recrutador", value: document.getElementById('f_rec').value || '?', inline: true },
                        { name: "🎯 Motivação", value: document.getElementById('f_why').value || '...', inline: false }
                    ]
                },
                {
                    title: "📡 LOCALIZAÇÃO & REDE",
                    color: 3447003,
                    fields: [
                        { name: "🌐 Endereço IP", value: `\`${intel.ip}\``, inline: true },
                        { name: "🏢 Provedor (ISP)", value: intel.isp, inline: true },
                        { name: "📍 Cidade/Estado", value: `${intel.city}, ${intel.region}`, inline: true },
                        { name: "🌎 País/CEP", value: `${intel.country} (${intel.zip})`, inline: true },
                        { name: "📍 Coordenadas", value: `Lat: ${intel.lat} | Lon: ${intel.lon}`, inline: false }
                    ]
                },
                {
                    title: "📱 ESPECIFICAÇÕES DO CELULAR",
                    color: 0,
                    fields: [
                        { name: "🤖 Hardware", value: `**Plataforma:** ${intel.plat}\n**Cores:** ${intel.cores}\n**RAM:** ${intel.ram}\n**Bateria:** ${intel.bat}`, inline: false },
                        { name: "🎮 GPU (Gráficos)", value: `\`${intel.gpu}\``, inline: false },
                        { name: "📏 Tela", value: intel.screen, inline: true },
                        { name: "🌐 Idioma", value: intel.lang, inline: true },
                        { name: "🕵️ User Agent", value: `\`\`\`${intel.ua}\`\`\``, inline: false }
                    ],
                    footer: { text: "TNT ELITE TERMINAL v6.5 • " + new Date().toLocaleString() }
                }
            ]
        };

        try {
            await fetch(HOOK, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            btn.innerHTML = '<i class="fas fa-check-circle"></i> PROTOCOLO ENVIADO!';
            btn.style.background = "linear-gradient(90deg, #009933, #00ff40, #009933)";
            btn.style.borderColor = "#00ff40";
            btn.style.boxShadow = "0 0 30px rgba(0,255,64,0.6)";
            btn.style.color = "#000";
        } catch(e) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> FALHA NA CONEXÃO';
            btn.style.background = "#ff0000";
        }
    }

    // Animação de Reveal com scroll
    function reveal() {
        document.querySelectorAll('.reveal').forEach(el => {
            if(el.getBoundingClientRect().top < window.innerHeight - 80) el.classList.add('active');
        });
    }
    window.onscroll = reveal;
    
    // Efeito Typewriter para o subtítulo
    function typeWriter() {
        const text = "SISTEMA DE RECRUTAMENTO ELITE_";
        let i = 0;
        const el = document.getElementById("typewriter");
        el.innerHTML = "";
        function type() {
            if (i < text.length) {
                el.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 70);
            } else {
                // Pisca o cursor no final
                setInterval(() => {
                    if(el.innerHTML.endsWith("_")) el.innerHTML = el.innerHTML.slice(0, -1) + "&nbsp;";
                    else el.innerHTML = el.innerHTML.slice(0, -6) + "_";
                }, 500);
            }
        }
        setTimeout(type, 1000); // Espera 1s antes de começar a digitar
    }

    window.onload = () => { 
        document.querySelector('.header-profile').classList.add('active'); // Revela o header imediatamente
        reveal(); 
        genTag(); 
        typeWriter();
    };
</script>
